<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Inscription</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* --- ANIMATIONS DE FOND --- */
        @keyframes gradientAnimation {
            0%   { background-position: 0%   50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0%   50%; }
        }

        /* --- POLICES --- */
        @font-face {
            font-family: 'Categories-elegant';
            src: url('categories-elegant.ttf') format('truetype');
            font-weight: normal;
        }

        /* --- STYLES GÉNÉRAUX --- */
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #240b14, #292929, #000000);
            background-size: 2000% 2000%;
            animation: gradientAnimation 15s ease infinite;
            color: #f8fafc;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- CONTENEUR FORMULAIRE (GLASSMORPHISM) --- */
        .form-container {
            width: 90%;
            max-width: 450px;
            padding: 3rem 2rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-family: 'Categories-elegant', serif;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            font-size: 0.9rem;
            color: #cbd5e1;
            margin-bottom: 2.5rem;
            opacity: 0.8;
        }

        /* --- CHAMPS DE SAISIE --- */
        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
            margin-left: 1rem;
            color: #f8fafc;
            opacity: 0.7;
        }

        input {
            width: 100%;
            padding: 1rem 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        /* --- BOUTON --- */
        .submit-btn {
            width: 100%;
            padding: 1rem;
            margin-top: 1rem;
            border: none;
            border-radius: 20px;
            background: #f8fafc;
            color: #1a1a1a;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.2);
            background: #ffffff;
        }

        /* --- LIEN DE RETOUR --- */
        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: #cbd5e1;
            text-decoration: none;
            font-size: 0.8rem;
            transition: 0.3s;
            opacity: 0.6;
        }

        .back-link:hover {
            opacity: 1;
            color: #f8fafc;
        }

        /* --- NAVIGATION FIXE (Copie de l'accueil) --- */
        nav {
            padding: 0.8rem 2rem;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 70px;
            position: fixed;
            bottom: 2rem;       
            left: 50%;            
            transform: translateX(-50%);
            width: 90%;
            max-width: 350px;
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-link {
            text-decoration: none;
            color: #f8fafc;
            font-size: 0.85rem;
            font-weight: 500;
            opacity: 0.7;
            transition: 0.3s;
        }

        .menu-icon {
            font-size: 1.3rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 40%;
            display: flex;
            align-items: center;
        }

        /* --- ANIMATION D'ENTRÉE --- */
        .reveal-form {
            animation: formAppear 1s ease-out forwards;
        }

        @keyframes formAppear {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <nav>
        <div class="nav-links">
            <a href="dessins.html" class="nav-link">Dessins</a>
            <a href="x.html" class="nav-link menu-icon">&#9776;</a>
            <a href="videos.html" class="nav-link">Vidéos</a>
        </div>
    </nav>

    <section class="form-container reveal-form">
        <h1>S'inscrire</h1>
        <p class="subtitle">Rejoignez la communauté pour suivre mes projets.</p>

        <form action="#">
            <div class="input-group">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" id="username" placeholder="Ex: BLUR_DX" required>
            </div>

            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="votre@email.com" required>
            </div>

            <div class="input-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="submit-btn">Créer mon compte</button>
        </form>

        
    </section>

</body>
</html>
